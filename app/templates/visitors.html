{% extends "base.html" %}

{% block title %}Visitor Management{% endblock %}

{% block content %}
<div class="prison-card p-4">
  <h2 class="mb-4" style="color: var(--prison-text);">Visitor Records</h2>

  <button class="btn-prison mb-3" data-bs-toggle="modal" data-bs-target="#addVisitorModal">Add Visitor</button>

  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>Visitor Name</th>
        <th>Relation</th>
        <th>Visit Date</th>
        <th>Inmate</th>
      </tr>
    </thead>
    <tbody>
      {% for v in visitors %}
        <tr>
          <td>{{ v[2] }}</td>
          <td>{{ v[3] }}</td>
          <td>{{ v[4] }}</td>
          <td>{{ v[-1] }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<!-- Add Visitor Modal -->
<div class="modal fade" id="addVisitorModal" tabindex="-1">
  <div class="modal-dialog">
    <form action="/add_visitor" method="POST" class="modal-content" style="background: var(--prison-medium); color: var(--prison-text);">
      <div class="modal-header" style="border-bottom: 1px solid var(--prison-rust);">
        <h5 class="modal-title">Add Visitor</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <label class="form-label">Inmate</label>
          <select name="inmate_id" class="form-select" required>
            {% for inmate in inmates %}
              <option value="{{ inmate[0] }}">{{ inmate[1] }}</option>
            {% endfor %}
          </select>
        </div>
        <input name="visitor_name" class="form-control mb-2" placeholder="Visitor Name" required>
        <input name="relation" class="form-control mb-2" placeholder="Relation" required>
        <input name="visit_date" type="date" class="form-control mb-2" required>
      </div>
      <div class="modal-footer" style="border-top: 1px solid var(--prison-rust);">
        <button type="submit" class="btn-prison">Add Visitor</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
