<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Request Visit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Request a Visit</h2>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Your Name</label>
      <input type="text" name="visitor_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Inmate Name</label>
      <input type="text" name="inmate_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Date (optional)</label>
      <input type="date" name="date_requested" class="form-control">
    </div>
    <button class="btn btn-primary">Submit Request</button>
    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary ms-2">Back to Login</a>
  </form>
</div>
</body>
</html>
